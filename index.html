<audio id="bgMusic" src="ost%20code.wav" loop></audio>
<div id="soundHint" style="
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  font-size:13px; opacity:.6; letter-spacing:1px; cursor:pointer;
  display:none;">🔈 нажмите, чтобы включить звук</div>

<script>
const music = document.getElementById("bgMusic");
const hint = document.getElementById("soundHint");
music.volume = 0.6;

function tryPlayMusic(){
    const playPromise = music.play();
    if(playPromise !== undefined){
        playPromise.then(() => {
            hint.style.display = "none";
        }).catch(() => {
            // браузер заблокировал автозапуск — покажем подсказку
            hint.style.display = "block";

            const startOnInteraction = () => {
                music.play();
                hint.style.display = "none";
                events.forEach(e => document.removeEventListener(e, startOnInteraction));
            };

            const events = ["click", "keydown", "touchstart", "scroll", "mousemove"];
            events.forEach(e => document.addEventListener(e, startOnInteraction, { once: true }));
        });
    }
}
tryPlayMusic();
</script>

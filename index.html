<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>End of the Journey</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background:#000;
color:#fff;
font-family:Consolas,monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}
#container{
width:900px;
max-width:90%;
text-align:center;
opacity:0;
animation:fade 2s forwards;
animation-delay:1.5s;
}
h1{
font-size:42px;
letter-spacing:5px;
margin-bottom:40px;
color:#6eff8b;
}
#text{
font-size:22px;
line-height:1.8;
}
.line{
opacity:0;
transition:opacity 1.8s ease;
margin:12px 0;
}
.line.show{
opacity:1;
}
/* 📦 зона под изображение, без отступа и без лишней высоты */
#imageBox{
display:flex;
justify-content:center;
align-items:center;
margin-top:0;
}
/* 🐱 котёнок */
#kitty{
width:320px;
border-radius:18px;
box-shadow:0 0 30px rgba(255,255,255,.15);
opacity:0;
transition:opacity 3s ease;
}
#kitty.show{
opacity:1;
}
/* 👋 финальная подпись */
#footer{
margin-top:10px;
font-size:15px;
opacity:0;
transition:opacity 3s ease;
}
#footer.show{
opacity:.5;
}
@keyframes fade{
to{
opacity:1;
}
}
</style>
</head>
<body>
<div id="container">
<h1>The End</h1>
<div id="text"></div>
<div id="imageBox"></div>
<div id="footer">Love, Ramil</div>
</div>

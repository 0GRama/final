<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>End of the Journey</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:Consolas,monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

#container{
width:900px;
max-width:90%;
text-align:center;
opacity:0;
animation:fade 2s forwards;
animation-delay:1.5s;
}

h1{
font-size:42px;
letter-spacing:5px;
margin-bottom:40px;
color:#6eff8b;
}

p{
font-size:22px;
line-height:1.8;
margin:12px 0;
}

img{
width:320px;
border-radius:18px;
margin-top:45px;
box-shadow:0 0 30px rgba(255,255,255,.15);
opacity:0;
animation:fade 2s forwards;
animation-delay:12s;
}

#footer{
margin-top:35px;
font-size:15px;
opacity:.5;
}

@keyframes fade{
to{
opacity:1;
}
}

.cursor{
display:inline-block;
width:10px;
background:white;
animation:blink .8s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

</style>

</head>

<body>

<div id="container">

<h1>The End</h1>

<p id="text"></p>

<img src="IPC_2026-05-21.19.09.03.1320.jpg">

<div id="footer">

Love, Ramil

</div>

</div>

<script>

const message=`Thank you for solving this puzzle.

If you're reading this, it means you've made it all the way to the end.

I hope this little adventure was enjoyable and worth your time.

There are no more ciphers, riddles, or hidden clues left to find.

You've discovered everything there was to discover.

Thank you for being part of this little adventure.

As a small token of my appreciation, here's a photo of my kitten.
`;

let i=0;

function type(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i);

i++;

setTimeout(type,35);

}

}

setTimeout(type,2500);

</script>

</body>
</html>
